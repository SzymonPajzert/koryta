    "seaborn (>=0.13.2,<0.14.0)",
    "tokenizers==0.22.2",
    "torch==2.12.0",
    "spacy==3.8.7",
    "spacy-legacy==3.0.12",
    "spacy-loggers==1.0.5",
]


dev = [
    "jupyterlab (>=4.5.6,<5.0.0)",
    "import-linter (>=2.11,<3.0)",
    "ruff (>=0.15.12,<0.16.0)",
