[project.scripts]
# jupyter lab is available as well for analysis
koryta = "koryta:main"
koryta_uploader = "uploader:main"
koryta_pipelines = "pipelines:main"
koryta_crawl = "crawl_cli:main"
koryta_scraper = "scraper:main"
koryta_scrape_krs = "scraper:scrape_krs"
koryta_scrape_krs_updates = "scraper:scrape_updates_by_dates"


[build-system]
requires = ["poetry-core>=2.3.2,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
ml = [
    '''pl_core_news_lg @ https://github.com/explosion/spacy-models/releases/download/pl_core_news_lg-3.8.0/pl_core_news_lg-3.8.0-py3-none-any.whl#sha256=3bc7296cd4d67fa9ee0904b25401b0e9a9a772d5c4756edf54143a2ff4c9dcc0''',
