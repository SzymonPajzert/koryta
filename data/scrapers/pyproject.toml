[tool.mypy]
python_version = "3.13"
mypy_path = "src"

[[tool.mypy.overrides]]
module = [
    "duckdb",
    "duckdb.*",
    "firebase_admin.*",
    "google.*",
    "scipy.*",
    "mwparserfromhell.*",
    "sklearn.*",
    "spacy.*",
    "cloudpathlib.*",
    "pymodulon.*",
    "adjustText.*",
    "joblib",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# Add "PL" (Pylint) and "C90" (Complexity) to default rules
select = ["E", "F", "I", "PL", "C90"]
ignore = [
    "PLR2004",
    "PLR0911",
    "PLW2901",
    "PLR0913",
    "PLR0904",
    "PLR0124",
    "PLW0603",
    "PLW0177",
    "PLW0602",
]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.ruff.lint.pylint]
max-args = 5
max-public-methods = 20
max-statements = 50
max-branches = 15

[tool.ruff.lint.per-file-ignores]
"src/scripts/fix_jsonl.py" = ["PLR0402"]
"src/scripts/text_gemini_on_ner.py" = ["PLR0402"]
"src/scrapers/article/hardcoded/listawstydupo.py" = ["E501"]
"src/scrapers/article/hardcoded/kazdymusigdziespracowac.py" = ["E501"]
"src/stores/storage.py" = ["PLR0402"]

[tool.pytest.ini_options]
markers = ["parametrize_skip_if"]
# addopts = "--cov=src --cov-report=term:skip-covered --durations=5"
addopts = "--durations=5 --ff-group-by-module"

[tool.importlinter]
root_packages = ["analysis", "stores", "scrapers", "util", "entities"]

exclude_type_checking_imports = true
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Clean architecture"
type = "layers"
layers = ["analysis", "stores", "scrapers", "util", "entities"]
ignore_imports = ["scrapers.krs.scrape -> analysis.*"]

[[tool.importlinter.contracts]]
name = "Do not import external packages"
type = "forbidden"
source_modules = ["scrapers", "util", "entities"]

forbidden_modules = [
    "bz2",
    "csv",
    "duckdb.**",
    "duckdb",
    "firebase_admin.**",
    "firebase_admin",
    "fnmatch",
    "google.**",
    "google",
    "io",
    "os.**",
    "os",
    "shutil",
    "sys.**",
    "sys",
    "tempfile",
    "urllib.**",
    "urllib",
    "zipfile.**",
    "zipfile",
    "zipfile",
]
ignore_imports = [
    "scrapers.krs.scrape -> analysis.interesting",
    "scrapers.article.test_postgres_queue -> os",
    "scrapers.article.postgres_queue -> os",
    "scrapers.article.scripts.bench_crawl -> sys",
    "scrapers.article.scripts.bench_crawl -> os",
    "scrapers.article.scripts.bench_crawl -> io",
    "scrapers.article.scripts.bench_crawl -> csv",
    "scrapers.article.parse_runner -> csv",
    "entities.util -> urllib",
    "scrapers.stores -> io",
    # Created a quick export of library util.firestore
    "util.firestore -> firebase_admin",
    "util.firestore -> os",
    "util.firestore -> sys",
]
