version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/util"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/data/scrapers"
    schedule:
      interval: "weekly"
