name: Vitest

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  vitest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install && pnpm rebuild better-sqlite3

      - name: Run Tests
        working-directory: frontend
        run: pnpm exec vitest run

  eslint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install && pnpm rebuild better-sqlite3

      - name: Build
        working-directory: frontend
        run: pnpm run build

      - name: Run Tests
        working-directory: frontend
        run: pnpm exec eslint .
