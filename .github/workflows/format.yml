name: Format and Typecheck (TS)

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install && pnpm rebuild better-sqlite3

      - name: Check format
        run: pnpm run format:check
        working-directory: frontend

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: frontend
